user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

  # Cache paths
  proxy_cache_path /var/cache/nginx/stats levels=1:2 keys_zone=stats_cache:10m max_size=100m inactive=30s;

  upstream backend {
    server backend:3000;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # SPA fallback routing
    location / {
      try_files $uri /index.html;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    # Static assets (build folder)
    location ~* ^.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Content-Type-Options "nosniff";
    }

    # API reverse proxy to backend
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      
      # Headers for proper proxying
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      
      # Pass upstream cache headers
      proxy_pass_header Cache-Control;
      proxy_pass_header Expires;

      # Disable proxy buffering for streaming responses
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
    }

    # Special caching for /api/stats
    location /api/stats {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Cache configuration - 30 seconds
      proxy_cache stats_cache;
      proxy_cache_valid 200 30s;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

      # Add cache status header
      add_header X-Cache-Status $upstream_cache_status;
      add_header X-Cache-Age $upstream_http_cache_control;
    }

    # Health check endpoint
    location /health {
      proxy_pass http://backend/health;
      access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}